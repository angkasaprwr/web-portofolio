services:
  - type: web
    name: sukma-portfolio-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=../prisma/schema.prisma
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
